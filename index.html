<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Working Memory Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --text: #f2f2f7;
      --text2: #8e8e93;
      --border: rgba(255,255,255,0.1);
      --blue: #4da3ff;
      --blue-bg: #0a2540;
      --green: #7bc67e;
      --green-bg: #0d2b10;
      --red: #ff6b6b;
      --red-bg: #2b0d0d;
      --active-bg: #1a3a5c;
      --active-text: #90c8ff;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 3rem;
      gap: 1.25rem;
      max-width: 420px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text2);
      text-align: center;
      line-height: 1.5;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .voice-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .voice-btn {
      padding: 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-appearance: none;
      text-align: center;
    }

    .voice-btn:active { transform: scale(0.97); }
    .voice-btn.selected {
      background: var(--blue-bg);
      color: var(--blue);
      border-color: var(--blue);
    }

    .stat {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem 0.5rem;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
    }

    /* Length stepper inside the Length stat */
    .stat-stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .step-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 18px;
      font-weight: 600;
      border-radius: 6px;
      border: 0.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    .step-btn:active { transform: scale(0.93); }
    .step-btn:hover { background: #3a3a3c; }
    .step-btn:disabled { opacity: 0.25; pointer-events: none; }

    .sequence-display {
      width: 100%;
      min-height: 96px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 1.25rem;
    }

    .seq-placeholder {
      font-size: 14px;
      color: var(--text2);
    }

    .seq-item {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      background: var(--surface2);
      border-radius: var(--radius-md);
      padding: 6px 16px;
      transition: background 0.15s, color 0.15s;
    }

    .seq-item.active {
      background: var(--active-bg);
      color: var(--active-text);
    }

    .seq-item.hidden {
      min-width: 52px;
      color: transparent;
      user-select: none;
    }

    .seq-item.hidden::after {
      content: "•";
      color: var(--text2);
    }

    .sequence-display.revealable {
      cursor: pointer;
    }

    .status-box {
      width: 100%;
      min-height: 60px;
      background: var(--surface2);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.25rem;
      text-align: center;
      font-size: 15px;
      color: var(--text2);
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }

    .status-box.listening {
      background: var(--blue-bg);
      color: var(--blue);
      font-weight: 500;
    }

    .status-box.correct {
      background: var(--green-bg);
      color: var(--green);
      font-weight: 500;
    }

    .status-box.wrong {
      background: var(--red-bg);
      color: var(--red);
      font-weight: 500;
    }

    .transcript-box {
      width: 100%;
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      min-height: 22px;
      font-style: italic;
    }

    .recall-hint {
      width: 100%;
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      line-height: 1.6;
      min-height: 20px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    button {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    button:active { transform: scale(0.97); }
    button:hover { background: var(--surface2); }

    button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button.primary:hover { background: #0C447C; }

    button.danger {
      background: var(--red-bg);
      color: var(--red);
      border-color: var(--red);
    }

    button.danger:hover { background: #3d1010; }
    button.full { grid-column: 1 / -1; }
    button:disabled { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Working Memory</h1>
    <p class="subtitle">Remember objects in order, then numbers in order.</p>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">Length</div>
        <div class="stat-stepper">
          <button class="step-btn" id="btn-dec" onclick="adjustStartLen(-1)">−</button>
          <span class="stat-value" id="stat-len">3</span>
          <button class="step-btn" id="btn-inc" onclick="adjustStartLen(1)">+</button>
        </div>
      </div>
      <div class="stat">
        <div class="stat-label">Streak</div>
        <div class="stat-value" id="stat-streak">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="stat-best">3</div>
      </div>
    </div>

    <div class="voice-row">
      <button class="voice-btn" id="voice-male" onclick="setVoice('male')">Male</button>
      <button class="voice-btn" id="voice-female" onclick="setVoice('female')">Female</button>
    </div>

    <div class="sequence-display" id="seq-display" onclick="revealSequence()">
      <span class="seq-placeholder">tap start to begin</span>
    </div>

    <div class="status-box" id="status-box">Press start to play a sequence.</div>
    <div class="transcript-box" id="transcript"></div>
    <div class="recall-hint" id="recall-hint"></div>

    <div class="btn-row" id="btn-row">
      <button class="primary full" onclick="startRound()">Start</button>
    </div>
  </div>

  <script>
    const OBJECTS = [
      "cat","dog","bird","fish","frog","wolf","fox","owl","duck",
      "cow","pig","horse","sheep","ant","crab","shark","hawk",
      "crow","bat","rat","mouse","lamb","bull","hen","elk","seal","whale",
      "cup","bowl","plate","knife","spoon","pot","pan","box","bag",
      "book","pen","key","lock","door","bed","chair","lamp","clock","ring",
      "belt","boot","hat","glove","brush","comb","soap","stone","leaf",
      "branch","seed","bush","log","rope","chain","hook","nail","bell",
      "ball","dart","card","coin","gem","bead","silk","wool","thread",
      "bread","cake","pie","soup","rice","corn","nut","fig","plum",
      "grape","peach","egg","milk","cheese","ham","prawn",
      "hill","cliff","cave","lake","pond","stream","beach","field","barn","bridge",
      "path","tower","shelf","drum","torch","flag","mask","sword","shield",
      "brick","cloud","flame","glass","grass","iron","match","paint","plank","smoke",
      "snail","spike","spine","stamp","stick","straw","tent","thorn","trunk","twig"
    ];
    const NUMBERS = [1,2,3,4,5,6,7,8,9];

    let seqLen = parseInt(localStorage.getItem("wm_seqLen") || "3");
    let streak = 0;
    let best = parseInt(localStorage.getItem("wm_best") || String(seqLen));
    let currentSeq = [];
    let expectedObjects = [];
    let expectedNumbers = [];
    let state = "idle";
    let hadIncorrect = false;
    let recognition = null;
    let choiceRecognition = null;
    let cancelled = false;
    let sequenceRevealed = false;

    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(type) {
      const ctx = getAudioCtx();
      if (ctx.state === "suspended") ctx.resume();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      if (type === "ding") {
        o.type = "sine";
        o.frequency.setValueAtTime(880, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.4, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
        o.start();
        o.stop(ctx.currentTime + 0.7);
      } else {
        o.type = "sawtooth";
        o.frequency.setValueAtTime(120, ctx.currentTime);
        g.gain.setValueAtTime(0.5, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
        o.start();
        o.stop(ctx.currentTime + 0.8);
      }
    }

    let ttsVoice = null;
    function loadVoice() {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      const en = voices.filter(v => v.lang.startsWith('en'));
      ttsVoice = en.find(v => /samantha|ava|allison|victoria|alex|daniel/i.test(v.name))
              || en.find(v => /premium/i.test(v.name))
              || en.find(v => /enhanced/i.test(v.name))
              || en.find(v => v.lang === 'en-US' && v.localService)
              || en.find(v => v.localService)
              || en[0]
              || voices[0];
    }
    speechSynthesis.addEventListener('voiceschanged', loadVoice);
    loadVoice();

    let selectedVoice = localStorage.getItem('wm_voice') || 'female';

    function setVoice(v) {
      selectedVoice = v;
      localStorage.setItem('wm_voice', v);
      document.getElementById('voice-male').classList.toggle('selected', v === 'male');
      document.getElementById('voice-female').classList.toggle('selected', v === 'female');
      // Clear cache so new voice loads fresh
      Object.keys(rawAudio).forEach(k => delete rawAudio[k]);
      Object.keys(decodedAudio).forEach(k => delete decodedAudio[k]);
      Object.keys(pendingAudio).forEach(k => delete pendingAudio[k]);
      preloadAll();
    }

    // Restore saved voice selection highlight
    if (selectedVoice) {
      document.getElementById('voice-' + selectedVoice)?.classList.add('selected');
    }

    // Pre-fetch audio files in background; decode on first play
    const rawAudio = {};
    const decodedAudio = {};
    const pendingAudio = {};
    const AUDIO_EXTENSIONS = ["mp3", "m4a", "wav"];

    function audioCacheKey(item, voice = selectedVoice) {
      return `${voice || "none"}:${item}`;
    }

    async function fetchAudioFile(item, voice = selectedVoice) {
      const roots = voice ? [`audio/${voice}`] : [];
      for (const root of roots) {
        for (const ext of AUDIO_EXTENSIONS) {
          try {
            const res = await fetch(`${root}/${item}.${ext}`);
            if (res.ok) return res.arrayBuffer();
          } catch(e) {}
        }
      }
      return null;
    }

    async function loadRawAudio(item, voice = selectedVoice) {
      const key = audioCacheKey(String(item), voice);
      if (rawAudio[key]) return rawAudio[key];
      if (!pendingAudio[key]) {
        pendingAudio[key] = fetchAudioFile(String(item), voice).then(audio => {
          if (audio) rawAudio[key] = audio;
          delete pendingAudio[key];
          return audio;
        });
      }
      return pendingAudio[key];
    }

    async function preloadAll() {
      if (!selectedVoice) return;
      const voice = selectedVoice;
      const items = [...OBJECTS, ...NUMBERS.map(String)];
      for (const item of items) {
        await loadRawAudio(item, voice);
      }
    }
    preloadAll();

    async function getBuffer(text) {
      const word = String(text);
      const key = audioCacheKey(word);
      if (decodedAudio[key]) return decodedAudio[key];
      const raw = rawAudio[key] || await loadRawAudio(word);
      if (!raw) return null;
      try {
        const ctx = getAudioCtx();
        decodedAudio[key] = await ctx.decodeAudioData(raw.slice(0));
        return decodedAudio[key];
      } catch(e) { return null; }
    }

    async function playWord(text) {
      const buffer = await getBuffer(text);
      if (buffer) {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();
        return new Promise(res => {
          const src = ctx.createBufferSource();
          src.buffer = buffer;
          src.connect(ctx.destination);
          const timeout = setTimeout(res, (buffer.duration * 1000) + 500);
          src.onended = () => { clearTimeout(timeout); res(); };
          src.start();
        });
      }
      return speakTTS(text);
    }

    function speakTTS(text) {
      return new Promise(res => {
        const u = new SpeechSynthesisUtterance(String(text));
        u.rate = 0.78;
        u.pitch = 1;
        if (ttsVoice) u.voice = ttsVoice;
        const fallback = setTimeout(res, 5000);
        u.onend = () => { clearTimeout(fallback); res(); };
        u.onerror = () => { clearTimeout(fallback); res(); };
        speechSynthesis.speak(u);
      });
    }

    function cancelSpeech() {
      speechSynthesis.cancel();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildSequence(len) {
      const numCount = Math.max(1, Math.floor(len / 2));
      const objCount = len - numCount;
      const objs = shuffle(OBJECTS).slice(0, objCount);
      const nums = shuffle(NUMBERS).slice(0, numCount);

      let seq;
      let attempts = 0;
      do {
        seq = shuffle([...objs, ...nums]);
        // Break up 3+ same-type runs
        for (let pass = 0; pass < 20; pass++) {
          let clean = true;
          for (let i = 0; i < seq.length - 2; i++) {
            const t = x => typeof x;
            if (t(seq[i]) === t(seq[i+1]) && t(seq[i+1]) === t(seq[i+2])) {
              for (let j = i + 3; j < seq.length; j++) {
                if (t(seq[j]) !== t(seq[i])) {
                  [seq[i+2], seq[j]] = [seq[j], seq[i+2]];
                  clean = false;
                  break;
                }
              }
            }
          }
          if (clean) break;
        }
        attempts++;
        // Reject if sequence order matches answer order (all objs before all nums)
        const firstNumIdx = seq.findIndex(x => typeof x === "number");
        const lastObjIdx = seq.reduce((acc, x, i) => typeof x === "string" ? i : acc, -1);
      } while (attempts < 20 && seq.findIndex(x => typeof x === "number") > seq.reduce((acc, x, i) => typeof x === "string" ? i : acc, -1));

      return seq;
    }

    function updateStats() {
      localStorage.setItem("wm_seqLen", seqLen);
      localStorage.setItem("wm_best", best);
      document.getElementById("stat-len").textContent = seqLen;
      document.getElementById("stat-streak").textContent = streak;
      document.getElementById("stat-best").textContent = best;
      const idle = state === "idle";
      document.getElementById("btn-dec").disabled = !idle || seqLen <= 3;
      document.getElementById("btn-inc").disabled = !idle || seqLen >= 12;
    }

    function adjustStartLen(delta) {
      if (state !== "idle") return;
      seqLen = Math.max(3, Math.min(12, seqLen + delta));
      if (seqLen > best) best = seqLen;
      updateStats();
    }

    function setStatus(msg, cls) {
      const b = document.getElementById("status-box");
      b.textContent = msg;
      b.className = "status-box" + (cls ? " " + cls : "");
    }

    function renderSequenceDisplay(activeIndex = -1) {
      const display = document.getElementById("seq-display");
      if (!currentSeq.length) {
        display.className = "sequence-display";
        display.innerHTML = `<span class="seq-placeholder">tap start to begin</span>`;
        return;
      }
      display.className = "sequence-display revealable";
      display.innerHTML = currentSeq.map((x, i) => {
        const classes = ["seq-item"];
        if (!sequenceRevealed) classes.push("hidden");
        if (i === activeIndex) classes.push("active");
        return `<span class="${classes.join(" ")}" id="si-${i}">${sequenceRevealed ? x : ""}</span>`;
      }).join("");
      if (!sequenceRevealed) {
        display.insertAdjacentHTML("beforeend", `<span class="seq-placeholder">tap to show</span>`);
      }
    }

    function revealSequence() {
      if (!currentSeq.length || sequenceRevealed) return;
      sequenceRevealed = true;
      renderSequenceDisplay();
    }

    function cancelRound() {
      cancelled = true;
      cancelSpeech();
      if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
      if (choiceRecognition) { try { choiceRecognition.stop(); } catch(e){} choiceRecognition = null; }
      state = "idle";
      currentSeq = [];
      sequenceRevealed = false;
      renderSequenceDisplay();
      document.getElementById("transcript").textContent = "";
      document.getElementById("recall-hint").textContent = "";
      setStatus("Cancelled. Press start to play a new sequence.");
      setButtons("start");
      updateStats();
    }

    function setButtons(mode) {
      const row = document.getElementById("btn-row");
      if (mode === "start") {
        row.innerHTML = `<button class="primary full" onclick="startRound()">Start</button>`;
      } else if (mode === "active") {
        row.innerHTML = `<button class="danger full" onclick="cancelRound()">Cancel</button>`;
      } else if (mode === "choice") {
        row.innerHTML = `
          <button onclick="choiceRepeat()">Repeat Level</button>
          <button onclick="choiceDecrease()">Step Down</button>
          <button class="danger full" onclick="cancelRound()">Cancel</button>
        `;
      } else if (mode === "none") {
        row.innerHTML = "";
      }
    }

    let speechWarmedUp = false;
    async function warmUpSpeech() {
      if (speechWarmedUp) return;
      speechWarmedUp = true;
      loadVoice();
      const u = new SpeechSynthesisUtterance(".");
      u.volume = 0.01;
      if (ttsVoice) u.voice = ttsVoice;
      speechSynthesis.speak(u);
      await new Promise(r => setTimeout(r, 300));
      speechSynthesis.cancel();
    }

    let micPermissionGranted = false;
    async function requestMicPermission() {
      if (micPermissionGranted) return;
      // Check if already granted without prompting
      if (navigator.permissions) {
        try {
          const result = await navigator.permissions.query({ name: "microphone" });
          if (result.state === "granted") { micPermissionGranted = true; return; }
          if (result.state === "denied") {
            setStatus("Microphone blocked. Enable in Settings > Safari > Microphone.", "wrong");
            throw new Error("denied");
          }
        } catch(e) {
          if (e.message === "denied") throw e;
          // permissions API not supported — fall through to getUserMedia
        }
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        micPermissionGranted = true;
      } catch(e) {
        setStatus("Microphone access denied. Enable in Settings > Safari > Microphone.", "wrong");
        throw e;
      }
    }

    async function startRound() {
      await warmUpSpeech();
      try { await requestMicPermission(); } catch(e) { return; }
      cancelled = false;
      hadIncorrect = false;
      currentSeq = buildSequence(seqLen);
      sequenceRevealed = false;
      expectedObjects = currentSeq.filter(x => typeof x === "string");
      expectedNumbers = currentSeq.filter(x => typeof x === "number");
      state = "playing";
      setButtons("active");
      setStatus("Listen carefully...");
      document.getElementById("recall-hint").textContent = "";
      document.getElementById("transcript").textContent = "";
      updateStats();

      renderSequenceDisplay();

      for (let i = 0; i < currentSeq.length; i++) {
        if (cancelled) return;
        await new Promise(r => setTimeout(r, i === 0 ? 300 : 400));
        if (cancelled) return;
        renderSequenceDisplay(i);
        await playWord(String(currentSeq[i]));
      }

      if (cancelled) return;

      renderSequenceDisplay();

      document.getElementById("recall-hint").textContent = "Recall the sequence.";
      state = "waiting";
      setStatus("Listening...", "listening");
      setButtons("active");
      startListening();
    }

    function startListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setStatus("Speech recognition not supported. Use Safari on iPhone.", "wrong");
        return;
      }
      const finalAlternatives = [];
      let interimTranscript = "";
      let answerTimer = null;
      let answerSubmitted = false;

      function submitAnswer() {
        if (answerSubmitted) return;
        answerSubmitted = true;
        if (answerTimer) clearTimeout(answerTimer);
        state = "checking";
        try { recognition.stop(); } catch(e) {}
        processAnswer(finalAlternatives.length ? finalAlternatives : [interimTranscript]);
      }

      recognition = new SR();
      recognition.lang = "en-US";
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 5;
      state = "listening";
      setStatus("Listening...", "listening");

      recognition.onresult = e => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const result = e.results[i];
          if (result.isFinal) {
            const alternatives = Array.from(result).map(alt => alt.transcript.trim()).filter(Boolean);
            if (alternatives.length) finalAlternatives.push(alternatives);
          } else {
            interim += result[0].transcript;
          }
        }
        interimTranscript = interim.trim();
        const displayText = finalAlternatives.map(group => group[0]).join(" ") || interimTranscript;
        document.getElementById("transcript").textContent = '"' + displayText + '"';
        if (finalAlternatives.length) {
          if (answerTimer) clearTimeout(answerTimer);
          answerTimer = setTimeout(submitAnswer, 1200);
        }
      };

      recognition.onerror = e => {
        if (cancelled) return;
        setStatus("Mic error: " + e.error + ". Tap Cancel and try again.", "wrong");
        state = "waiting";
        setButtons("active");
      };

      recognition.onend = () => {
        if (cancelled) return;
        if (state === "checking") return;
        if (finalAlternatives.length) {
          submitAnswer();
        } else if (state === "listening") {
          state = "waiting";
          setButtons("active");
          setStatus("Didn't catch that. Tap Cancel to restart.", "wrong");
        }
      };

      recognition.start();
    }

    function expandTranscriptAlternatives(input) {
      if (!Array.isArray(input)) return [String(input || "")];
      if (!Array.isArray(input[0])) return input.map(String);
      return input.reduce((phrases, group) => {
        const next = [];
        for (const phrase of phrases) {
          for (const alt of group) next.push((phrase + " " + alt).trim());
        }
        return next.slice(0, 50);
      }, [""]);
    }

    function extractFromSpeech(transcript) {
      const numberWords = {
        one:1, won:1, wan:1,
        two:2, to:2, too:2, tu:2,
        three:3, free:3, tree:3,
        four:4, for:4, fore:4,
        five:5, fife:5,
        six:6, sicks:6, sex:6,
        seven:7, sevin:7,
        eight:8, ate:8, ait:8,
        nine:9, nein:9
      };
      const words = transcript.toLowerCase()
        .replace(/[^a-z0-9 ]/g, " ")
        .split(/\s+/)
        .filter(Boolean);

      const heard = [];
      for (const w of words) {
        if (numberWords[w] !== undefined) {
          heard.push(numberWords[w]);
        } else if (/^\d+$/.test(w)) {
          for (const ch of w) {
            const d = parseInt(ch);
            if (d >= 1 && d <= 9) heard.push(d);
          }
        } else if (OBJECTS.includes(w)) {
          heard.push(w);
        }
      }
      return heard;
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function expectedAnswer() {
      return [...expectedObjects, ...expectedNumbers];
    }

    async function processAnswer(transcript) {
      if (cancelled) return;
      state = "checking";
      const target = expectedAnswer();
      const transcriptOptions = expandTranscriptAlternatives(transcript);
      const heardOptions = transcriptOptions
        .map(t => extractFromSpeech(t))
        .filter(heard => heard.length);
      const heard = heardOptions.find(option => arraysEqual(option, target)) || heardOptions[0] || [];
      const correct = heardOptions.some(option => arraysEqual(option, target));
      if (heard.length) {
        document.getElementById("transcript").textContent = '"' + heard.join(" ") + '"';
      }

      if (correct) {
        playTone("ding");
        streak++;
        if (seqLen > best) best = seqLen;

        if (streak > 0 && streak % 3 === 0) {
          seqLen++;
          if (seqLen > best) best = seqLen;
          updateStats();
          setStatus(`Correct! Sequence now ${seqLen}.`, "correct");
        } else {
          updateStats();
          setStatus("Correct!", "correct");
        }

        if (hadIncorrect) {
          await new Promise(r => setTimeout(r, 1000));
          if (cancelled) return;
          setStatus("Want to repeat this level or step down?");
          setButtons("choice");
          startVoiceChoice();
        } else {
          await new Promise(r => setTimeout(r, 1200));
          if (cancelled) return;
          startRound();
        }

      } else {
        playTone("buzz");
        hadIncorrect = true;
        streak = 0;
        updateStats();
        setStatus("Incorrect. Repeating...", "wrong");
        await new Promise(r => setTimeout(r, 1800));
        if (cancelled) return;
        repeatRound();
      }
    }

    async function repeatRound() {
      if (cancelled) return;
      state = "playing";
      setButtons("active");
      setStatus("Listen again...");
      document.getElementById("transcript").textContent = "";
      document.getElementById("recall-hint").textContent = "";
      sequenceRevealed = false;

      renderSequenceDisplay();

      for (let i = 0; i < currentSeq.length; i++) {
        if (cancelled) return;
        await new Promise(r => setTimeout(r, i === 0 ? 300 : 400));
        if (cancelled) return;
        renderSequenceDisplay(i);
        await playWord(String(currentSeq[i]));
      }

      if (cancelled) return;

      renderSequenceDisplay();

      document.getElementById("recall-hint").textContent = "Recall the sequence.";
      state = "waiting";
      setStatus("Listening...", "listening");
      setButtons("active");
      startListening();
    }

    function startVoiceChoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;
      choiceRecognition = new SR();
      choiceRecognition.lang = "en-US";
      choiceRecognition.interimResults = false;
      choiceRecognition.onresult = e => {
        const t = e.results[0][0].transcript.toLowerCase();
        if (t.includes("decrease") || t.includes("step") || t.includes("down")) {
          choiceDecrease();
        } else if (t.includes("repeat") || t.includes("same") || t.includes("again")) {
          choiceRepeat();
        }
      };
      choiceRecognition.onerror = () => {};
      choiceRecognition.start();
    }

    function choiceRepeat() {
      if (choiceRecognition) { try { choiceRecognition.stop(); } catch(e){} choiceRecognition = null; }
      hadIncorrect = false;
      startRound();
    }

    function choiceDecrease() {
      if (choiceRecognition) { try { choiceRecognition.stop(); } catch(e){} choiceRecognition = null; }
      if (seqLen > 3) seqLen--;
      hadIncorrect = false;
      updateStats();
      startRound();
    }

    updateStats();
  </script>
